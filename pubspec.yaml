name: medical_request_app
description: Medical Request Voice App - create medical supply request forms using voice or manual entry. Offline, Arabic & English speech recognition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.4 <5.0.0'
  flutter: '>=3.24.5'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Speech & input
  speech_to_text: ^7.5.0
  permission_handler: ^12.0.3
  file_picker: ^9.0.0

  # Export & share
  share_plus: ^11.0.0
  archive: ^3.6.1
  xml: ^6.5.0
  intl: ^0.20.2

  # Misc
  uuid: ^4.5.1
  collection: ^1.18.0
  shared_preferences: ^2.3.2

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.3

  # Crypto for license codes
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/seed/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
