org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Force AGP 9 to fall back to legacy DSL structures to support speech_to_text
android.newDsl=false
android.skipDependencyValidation=true
# Ensure older libraries do not trigger strict metadata alignment issues
android.useAndroidX=true
android.enableJetifier=true
# This newDsl flag was added by the Flutter template
#  android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Ensure compileSdk and targetSdk are set to 36 to satisfy newer plugin AAR metadata
flutter.compileSdkVersion=36
flutter.targetSdkVersion=36
android.disableResourceValidation=true
